<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Success - Fit-Hit Gym</title>
    <!-- Outfit Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/ccdbd762c2.js" crossorigin="anonymous"></script>
    <style>
        body {
            background: linear-gradient(rgba(10, 10, 12, 0.88), rgba(10, 10, 12, 0.92)), url('{% static "images/gym_bg_main.png" %}');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            font-family: 'Outfit', sans-serif;
            margin: 0;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        section {
            width: 100%;
            max-width: 550px;
            margin: 20px;
            background: rgba(20, 20, 22, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            text-align: center;
            box-sizing: border-box;
        }

        h1 {
            color: #34c759;
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        p {
            font-size: 1.05rem;
            color: #a1a1a6;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        p a {
            color: #ff5e3a;
            text-decoration: none;
            font-weight: 600;
        }

        p a:hover {
            text-decoration: underline;
        }

        .actions {
            margin-top: 30px;
        }

        .actions a.bt {
            display: inline-block;
            padding: 14px 35px;
            font-size: 1rem;
            color: #fff;
            background: linear-gradient(135deg, #ff4500, #ff8c00);
            text-decoration: none;
            border-radius: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 15px rgba(255, 69, 0, 0.3);
            transition: all 0.3s ease;
        }

        .actions a.bt:hover {
            opacity: 0.95;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 69, 0, 0.45);
        }

        .text-center {
            margin-bottom: 20px;
        }

        .text-center dotlottie-player {
            width: 100%;
            height: 250px;
            border: none;
            margin: 0 auto;
        }

        .success-text {
            font-size: 1.5rem;
            color: #34c759;
            font-weight: 800;
            margin: 20px 0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>
    <section>
        <div class="text-center">
            <script src="https://unpkg.com/@dotlottie/player-component@latest/dist/dotlottie-player.mjs" type="module"></script> 
            <dotlottie-player src="https://lottie.host/f015bd79-aaed-4c3b-90d4-48904c310ca7/KGvzi5F7ZF.json" background="transparent" speed="1" autoplay direction="1" mode="normal"></dotlottie-player>
            <div class="success-text">Payment Success!</div>
            <p>Thanks for your order!</p>
        </div>
        <p>
            If you have any questions, feel free to email us at
            <a href="mailto:orders@example.com">orders@example.com</a>.
        </p>
        <div class="actions">
            <a href="{% url 'index' %}" class="bt">Exit to Dashboard</a>
        </div>
    </section>
</body>
</html>
