{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Fit-Hit Gym</title>
    <!-- Outfit Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/ccdbd762c2.js" crossorigin="anonymous"></script>
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding: 40px 20px;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-y: auto;
            position: relative;
            box-sizing: border-box;
        }

        /* Animated Parallax Background */
        .bg-zoom-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .bg-zoom-image {
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(10, 10, 12, 0.55), rgba(10, 10, 12, 0.65)), url('{% static "images/login_bg.png" %}');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            animation: kenburns 25s ease-in-out infinite;
        }

        @keyframes kenburns {
            0%, 100% { transform: scale(1.02) translate(0px, 0px); }
            50% { transform: scale(1.08) translate(-10px, -5px); }
        }
        
        .form {
            background: rgba(18, 18, 20, 0.65);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding: 40px;
            width: 100%;
            max-width: 380px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-sizing: border-box;
            transition: transform 0.3s ease, border-color 0.3s ease;
            z-index: 2;
        }

        .form:hover {
            border-color: rgba(255, 94, 58, 0.25);
            transform: translateY(-2px);
        }
        
        .form-title {
            font-size: 2rem;
            font-weight: 800;
            text-align: center;
            margin: 0 0 10px;
            background: linear-gradient(135deg, #ff4500, #ff8c00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-subtitle {
            font-size: 0.95rem;
            color: #a1a1a6;
            text-align: center;
            margin: -10px 0 10px;
        }
        
        .input-container {
            position: relative;
            width: 100%;
        }
        
        .input-container input {
            background-color: rgba(255, 255, 255, 0.03);
            outline: none;
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #fff;
            padding: 16px 20px;
            font-size: 0.95rem;
            width: 100%;
            border-radius: 12px;
            box-sizing: border-box;
            transition: all 0.3s ease;
            font-family: 'Outfit', sans-serif;
        }
        
        .input-container input:focus {
            background-color: rgba(255, 255, 255, 0.05);
            border-color: #ff5e3a;
            box-shadow: 0 0 15px rgba(255, 94, 58, 0.2);
        }

        .input-container input::placeholder {
            color: #71717a;
        }
        
        .submit {
            display: block;
            padding: 15px;
            background: linear-gradient(135deg, #ff4500, #ff8c00);
            color: #ffffff;
            font-size: 1rem;
            font-weight: 700;
            width: 100%;
            border-radius: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 69, 0, 0.3);
        }
        
        .submit:hover {
            opacity: 0.95;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 69, 0, 0.45);
        }

        .submit:active {
            transform: translateY(0);
        }
        
        .signup-link {
            color: #a1a1a6;
            font-size: 0.9rem;
            text-align: center;
            margin-top: 10px;
        }
        
        .signup-link a {
            color: #ff5e3a;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s ease;
        }

        .signup-link a:hover {
            color: #ff8c00;
            text-decoration: underline;
        }

        /* Back to site styling */
        .back-home {
            position: absolute;
            top: 25px;
            left: 25px;
            text-decoration: none;
            color: #a1a1a6;
            font-weight: 600;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: color 0.2s ease;
            background: rgba(18, 18, 20, 0.6);
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .back-home:hover {
            color: #fff;
            border-color: rgba(255, 255, 255, 0.15);
        }
    </style>
</head>
<body>
    <div class="bg-zoom-wrapper">
        <div class="bg-zoom-image"></div>
    </div>

    <a href="/index" class="back-home"><i class="fas fa-arrow-left"></i> Back to Home</a>
    
    <form class="form" action="" method="POST">{% csrf_token %}
        <div>
            <p class="form-title">Welcome Back</p>
            <p class="form-subtitle">Log in to access your dashboard</p>
        </div>

        <!-- Django messages framework alerts -->
        {% if messages %}
            <div style="margin-bottom: 10px; width: 100%;">
                {% for message in messages %}
                    <div style="background-color: {% if message.tags == 'success' %}rgba(76, 217, 100, 0.12){% else %}rgba(255, 90, 90, 0.12){% endif %}; border: 1px solid {% if message.tags == 'success' %}rgba(76, 217, 100, 0.25){% else %}rgba(255, 90, 90, 0.25){% endif %}; color: {% if message.tags == 'success' %}#4cd964{% else %}#ff5a5a{% endif %}; padding: 12px 16px; border-radius: 12px; font-size: 0.9rem; font-weight: 600; display: flex; align-items: center; gap: 8px;">
                        <i class="fas {% if message.tags == 'success' %}fa-circle-check{% else %}fa-triangle-exclamation{% endif %}"></i>
                        <span>{{ message }}</span>
                    </div>
                {% endfor %}
            </div>
        {% endif %}
        
        <div class="input-container">
            <input placeholder="Username" name="username" id="username" type="text" required autocomplete="username">
        </div>
        
        <div class="input-container">
            <input placeholder="Password" name="password" id="password" type="password" required autocomplete="current-password">
        </div>
        
        <button class="submit" type="submit">
            Login
        </button>

        <p class="signup-link">
            Don't have an account?
            <a href="/signup">Sign up</a>
        </p>
    </form>
</body>
</html>
