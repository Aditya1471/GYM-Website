{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proceed to Payment - Fit-Hit Gym</title>
    <!-- Outfit Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/ccdbd762c2.js" crossorigin="anonymous"></script>
    <style>
        body {
            background: linear-gradient(rgba(10, 10, 12, 0.88), rgba(10, 10, 12, 0.92)), url('{% static "images/gym_bg_main.png" %}');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            font-family: 'Outfit', sans-serif;
            margin: 0;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        main {
            width: 100%;
            max-width: 500px;
            margin: 20px;
            background: rgba(20, 20, 22, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            position: relative;
            box-sizing: border-box;
            text-align: center;
        }

        h2 {
            font-size: 1.6rem;
            font-weight: 800;
            margin: 20px 0 25px;
            background: linear-gradient(135deg, #ff4500, #ff8c00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Tabs styling */
        .payment-tab {
            background-color: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            color: #d1d1d6;
            padding: 10px 20px;
            font-size: 0.88rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s ease;
            font-family: inherit;
        }
        .payment-tab:hover {
            background-color: rgba(255, 94, 58, 0.08);
            border-color: rgba(255, 94, 58, 0.3);
            color: #ff8c00;
        }
        .payment-tab.active {
            background: linear-gradient(135deg, #ff4500, #ff8c00);
            color: #fff;
            border-color: transparent;
            box-shadow: 0 4px 12px rgba(255, 69, 0, 0.25);
        }

        .btn-primary {
            background: linear-gradient(135deg, #ff4500, #ff8c00);
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 16px 32px;
            font-size: 1rem;
            font-weight: 700;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-block;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 15px rgba(255, 69, 0, 0.3);
            box-sizing: border-box;
        }

        .btn-primary:hover {
            opacity: 0.95;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 69, 0, 0.45);
        }

        .back-btn {
            text-decoration: none;
            color: #a1a1a6;
            font-size: 18px;
            position: absolute;
            top: 25px;
            left: 25px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .back-btn:hover {
            color: #fff;
            background-color: rgba(255, 94, 58, 0.2);
            border-color: rgba(255, 94, 58, 0.3);
        }
    </style>
</head>
<body>
    <main>
        <a href="/customer" class="back-btn"><i class="fa-solid fa-chevron-left"></i></a>
        <h2>Select Payment Method</h2>
        
        <!-- Card/Stripe Content -->
        <div class="payment-content" id="content-card">
            <p style="margin: 0 0 25px; font-size: 0.95rem; color: #a1a1a6; line-height: 1.5; text-align: center;">Pay securely via Stripe checkout gateway using credit card, debit card, or international cards.</p>
            <form action="{% url 'create-checkout-session' %}" method="POST" style="margin: 0; padding: 0; border: none; background: none; box-shadow: none;">
                {% csrf_token %}
                <button type="submit" class="btn-primary" id="checkout-button"><i class="fa-solid fa-credit-card"></i> Pay with Card</button>
            </form>
        </div>
    </main>
</body>
</html>
