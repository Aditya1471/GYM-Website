{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shipping Details - Fit-Hit Gym</title>
    <!-- Outfit Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/ccdbd762c2.js" crossorigin="anonymous"></script>
    <style>
        body {
            background: linear-gradient(rgba(10, 10, 12, 0.88), rgba(10, 10, 12, 0.92)), url('{% static "images/gym_bg_main.png" %}');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            font-family: 'Outfit', sans-serif;
            margin: 0;
            color: #fff;
            min-height: 100vh;
        }

        header {
            background-color: rgba(15, 15, 15, 0.95);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            color: #fff;
            padding: 25px;
            text-align: center;
            position: relative;
        }

        header::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, #ff4500, #ff8c00);
        }

        header h1 {
            margin: 0;
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 800;
        }

        .back-btn {
            text-decoration: none;
            color: #a1a1a6;
            font-size: 20px;
            font-weight: bold;
            padding: 8px;
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            left: 30px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .back-btn:hover {
            color: #fff;
            background-color: rgba(255, 94, 58, 0.2);
            border-color: rgba(255, 94, 58, 0.3);
        }

        main {
            padding: 40px 20px;
            max-width: 600px;
            margin: 0 auto;
            box-sizing: border-box;
        }

        /* Glassmorphic Form Container */
        .control-form {
            background: rgba(20, 20, 22, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.08);
            margin-top: 20px;
            transition: border-color 0.3s ease;
        }

        .control-form:hover {
            border-color: rgba(255, 94, 58, 0.25);
        }

        .control-form h2 {
            margin-top: 0;
            margin-bottom: 25px;
            font-size: 22px;
            font-weight: 800;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            text-align: center;
            background: linear-gradient(135deg, #ff4500, #ff8c00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .control-form p {
            font-size: 0.95rem;
            color: #a1a1a6;
            line-height: 1.5;
            margin-bottom: 15px;
        }

        .control-form label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #d1d1d6;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Target all inputs generated by {{ form.as_p }} */
        .control-form input,
        .control-form select,
        .control-form textarea {
            width: 100%;
            padding: 14px 18px;
            background-color: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            font-size: 0.95rem;
            color: #fff;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
            transition: all 0.3s ease;
            outline: none;
            margin-bottom: 20px;
            display: block;
        }

        .control-form select option {
            background-color: #1a1a1c;
            color: #fff;
        }

        .control-form input:focus,
        .control-form select:focus,
        .control-form textarea:focus {
            background-color: rgba(255, 255, 255, 0.05);
            border-color: #ff5e3a;
            box-shadow: 0 0 15px rgba(255, 94, 58, 0.15);
        }

        .control-form button {
            background: linear-gradient(135deg, #ff4500, #ff8c00);
            color: #fff;
            border: none;
            padding: 15px 30px;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 69, 0, 0.3);
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 10px;
        }

        .control-form button:hover {
            opacity: 0.95;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 69, 0, 0.45);
        }

        .control-form .errorlist {
            color: #ff5a5a;
            margin-bottom: 20px;
            list-style: none;
            padding-left: 0;
            font-size: 0.9rem;
        }
        
        .info-note {
            background-color: rgba(255, 94, 58, 0.05);
            border: 1px solid rgba(255, 94, 58, 0.15);
            padding: 15px;
            border-radius: 12px;
            margin-top: 25px;
            text-align: center;
        }
        
        .info-note p {
            margin: 0;
            color: #ff8c00;
            font-weight: 600;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <header>
        <a href="/cart" class="back-btn"><i class="fa-solid fa-chevron-left"></i></a>
        <h1>Customer Address</h1>
    </header>
   
    <main>
        <form class="control-form" method="POST" action="{% url 'customer_form' %}">
            {% csrf_token %}
            <h2>Delivery Details</h2>
            
            {{ form.as_p }}
            
            <button type="submit">Save Order Details</button>
            
            <div class="info-note">
                <p><i class="fa-solid fa-circle-info"></i> Please enter your details first. Otherwise, the order cannot be delivered!</p>
            </div>
        </form>
    </main>
</body>
</html>
