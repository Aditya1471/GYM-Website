{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Become a Member - Fit-Hit Gym</title>
    <!-- Outfit Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/ccdbd762c2.js" crossorigin="anonymous"></script>
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #0f0f11;
            color: #fff;
        }

        /* Banner Container */
        .container {
            position: relative;
            text-align: center;
            background: linear-gradient(135deg, rgba(15, 15, 17, 0.95), rgba(20, 20, 25, 0.95)), url('{% static "images/register_bg.png" %}');
            background-size: cover;
            background-position: center;
            height: 35vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .container::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, #ff4500, #ff8c00);
        }

        .container p {
            color: #ffffff;
            font-size: 3.5rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
            margin: 0;
            z-index: 1;
        }

        /* Main Section */
        section {
            padding: 60px 20px;
            background-color: #0f0f11;
            min-height: calc(100vh - 35vh);
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
        }

        .contact-container {
            width: 100%;
            max-width: 540px;
            margin: 0 auto;
        }

        /* Glassmorphic Form Container */
        .form-container {
            background: rgba(20, 20, 22, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: border-color 0.3s ease;
        }

        .form-container:hover {
            border-color: rgba(255, 94, 58, 0.25);
        }
        
        .form-container h3 {
            font-size: 2.2rem;
            font-weight: 800;
            text-align: center;
            margin: 0 0 10px;
            background: linear-gradient(135deg, #ff4500, #ff8c00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-subtitle {
            font-size: 0.95rem;
            color: #a1a1a6;
            text-align: center;
            margin: -5px 0 25px;
        }

        .contact-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
       
        .contact-form label {
            display: block;
            font-size: 0.85rem;
            color: #a1a1a6;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }
        
        .contact-form input {
            width: 100%;
            padding: 14px 18px;
            background-color: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            font-size: 0.95rem;
            color: #fff;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
            transition: all 0.3s ease;
            outline: none;
        }

        .contact-form input:focus {
            background-color: rgba(255, 255, 255, 0.05);
            border-color: #ff5e3a;
            box-shadow: 0 0 15px rgba(255, 94, 58, 0.15);
        }
        
        .contact-form input[type="submit"] {
            margin-top: 10px;
            background: linear-gradient(135deg, #ff4500, #ff8c00);
            color: #fff;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            border: none;
            box-shadow: 0 4px 15px rgba(255, 69, 0, 0.3);
            transition: all 0.3s ease;
        }
 
        .contact-form input[type="submit"]:hover {
            opacity: 0.95;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 69, 0, 0.45);
        }

        .contact-form input[type="submit"]:active {
            transform: translateY(0);
        }
        
        .contact-form a {
            color: #ff5e3a;
            text-decoration: none;
            display: block;
            text-align: center;
            margin-top: 15px;
            font-size: 0.95rem;
            font-weight: 600;
            transition: color 0.2s ease;
        }

        .contact-form a:hover {
            color: #ff8c00;
            text-decoration: underline;
        }

        .back-home {
            position: absolute;
            top: 25px;
            left: 25px;
            text-decoration: none;
            color: #a1a1a6;
            font-weight: 600;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: color 0.2s ease;
            background: rgba(18, 18, 20, 0.6);
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .back-home:hover {
            color: #fff;
            border-color: rgba(255, 255, 255, 0.15);
        }

        @media (max-width: 768px) {
            .container p {
                font-size: 2.2rem;
            }

            .container {
                height: 25vh;
            }

            section {
                padding: 30px 15px;
            }

            .form-container {
                padding: 25px;
            }
        }
    </style>
</head>
<body>
    <a href="/index" class="back-home"><i class="fas fa-arrow-left"></i> Back to Home</a>
    
    <div class="container">
        <p>Become a Member</p>
    </div>
    <section>
        <div class="contact-container">
            <div class="form-container">
                <h3>Welcome</h3>
                <p class="form-subtitle">Create a membership account today</p>
                <form action="" method="POST" class="contact-form">
                    {% csrf_token %}
                    <div>
                        <label for="uname">User Name</label>
                        <input type="text" id="uname" name="uname" placeholder="Your Name" required autocomplete="username">
                    </div>
                    <div>
                        <label for="phone">Contact No.</label>
                        <input type="tel" id="phone" name="phone" placeholder="Enter Contact No." required autocomplete="tel">
                    </div>
                    <div>
                        <label for="email">E-mail</label>
                        <input type="email" id="email" name="email" placeholder="Enter Email" required autocomplete="email">
                    </div>
                    <div>
                        <label for="psw">Password</label>
                        <input type="password" id="psw" name="psw" placeholder="Enter Password" required autocomplete="new-password">
                    </div>
                    <div>
                        <label for="repsw">Re-Password</label>
                        <input type="password" id="repsw" name="repsw" placeholder="Re-enter Password" required autocomplete="new-password">
                    </div>
                    <input type="submit" value="Submit">
                    <a href="/">Already have an account? Log In</a>
                </form>
            </div>
        </div>
    </section>
</body>
</html>
